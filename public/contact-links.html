<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sona K - Contact Links</title>
    <style>
      :root {
        --bg: #0b0b0f;
        --card: #12121a;
        --text: #f5f5f7;
        --muted: #b3b3bf;
        --accent: #f0c24f;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: radial-gradient(circle at top right, #1d1a10, var(--bg) 40%);
        color: var(--text);
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }
      .card {
        width: min(420px, 100%);
        background: rgba(18, 18, 26, 0.88);
        border: 1px solid rgba(240, 194, 79, 0.25);
        border-radius: 18px;
        padding: 24px;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
      }
      h1 {
        margin: 0 0 8px;
        font-size: 1.5rem;
      }
      p {
        margin: 0 0 18px;
        color: var(--muted);
        line-height: 1.5;
      }
      .links {
        display: grid;
        gap: 10px;
      }
      a {
        text-decoration: none;
        color: var(--text);
        background: #1c1c28;
        border: 1px solid rgba(240, 194, 79, 0.2);
        border-radius: 12px;
        padding: 12px 14px;
        font-weight: 600;
        transition: 0.2s ease;
      }
      a:hover {
        transform: translateY(-1px);
        border-color: var(--accent);
        color: var(--accent);
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Connect with Sona K</h1>
      <p>Choose an option below.</p>
      <div class="links">
        <a href="https://github.com/sonasasidharan" target="_blank" rel="noopener noreferrer">GitHub</a>
        <a href="https://www.linkedin.com/in/sona-k-web" target="_blank" rel="noopener noreferrer">LinkedIn</a>
        <a href="mailto:sonasasidharank2002@gmail.com">Mail</a>
      </div>
    </main>
  </body>
</html>
